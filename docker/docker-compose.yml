version: '3.8'

services:
  jyl-app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: jyl-app
    ports:
      - "9292:3000"
    volumes:
      - ../storage:/app/storage
    env_file:
      - .env_docker
    environment:
      - DB_HOST=jyl-db
    depends_on:
      jyl-db:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M # 限制 Node 应用最大内存

  jyl-db:
    image: mysql:8.0
    container_name: jyl-db
    command:
      - --default-authentication-plugin=mysql_native_password
      - --skip-host-cache
      - --skip-name-resolve
      - --innodb-buffer-pool-size=256M # 对 2G 内存机器进行优化，减小缓冲池
      - --max-connections=50
    env_file:
      - .env_docker
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: always
    deploy:
      resources:
        limits:
          memory: 800M # 限制 MySQL 最大内存

volumes:
  mysql_data:
